name: Inventory CI

on:
  workflow_dispatch:
  push:
    paths:
      - "inventory/**"
      - ".github/workflows/inventory-ci.yml"
      - ".github/workflows/_service-ci-template.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "inventory/**"
      - ".github/workflows/inventory-ci.yml"
      - ".github/workflows/_service-ci-template.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  service-ci:
    name: inventory - Service CI
    uses: ./.github/workflows/_service-ci-template.yml
    with:
      service_name: inventory
