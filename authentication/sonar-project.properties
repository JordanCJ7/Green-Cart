# SonarQube Project Configuration for Authentication Service
sonar.projectKey=green-cart-authentication
sonar.projectName=Green Cart Authentication Service
sonar.projectVersion=1.0.0

# Exclusions
# Docker high vulnerabilities in official Node.js images (sonarqube:S6505)
# These are inherited from Alpine base and pre-evaluated by maintainers
sonar.exclusions=Dockerfile

# Language and source settings
sonar.sources=src
sonar.tests=src/__tests__
sonar.language=ts
sonar.sourceEncoding=UTF-8
