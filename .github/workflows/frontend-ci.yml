name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/_service-ci-template.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/_service-ci-template.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  service-ci:
    name: frontend - Service CI
    uses: ./.github/workflows/_service-ci-template.yml
    with:
      service_name: frontend
