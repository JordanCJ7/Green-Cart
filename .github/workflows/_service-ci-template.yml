name: Service CI Template

on:
  workflow_call:
    inputs:
      service_name:
        description: Service directory name
        required: true
        type: string
      allow_install_scripts:
        description: Allow lifecycle scripts during npm ci (set true only if required)
        required: false
        default: false
        type: boolean

jobs:
  quality:
    name: "${{ inputs.service_name }} - Quality (Lint, Type Check, Build)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.service_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles(format('{0}/package.json', inputs.service_name)) != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ inputs.service_name }}/package-lock.json

      - name: Install dependencies (safe mode)
        if: ${{ hashFiles(format('{0}/package.json', inputs.service_name)) != '' && !inputs.allow_install_scripts }}
        run: npm ci --ignore-scripts

      - name: Rebuild dependencies with scripts (opt-in)
        if: ${{ hashFiles(format('{0}/package.json', inputs.service_name)) != '' && inputs.allow_install_scripts }}
        run: npm ci --ignore-scripts && npm rebuild

      - name: Lint
        if: ${{ hashFiles(format('{0}/package.json', inputs.service_name)) != '' }}
        run: npm run lint --if-present

      - name: Type check
        if: ${{ hashFiles(format('{0}/package.json', inputs.service_name)) != '' }}
        run: npm run typecheck --if-present

      - name: Build
        if: ${{ hashFiles(format('{0}/package.json', inputs.service_name)) != '' }}
        run: npm run build --if-present

      - name: No package.json fallback
        if: ${{ hashFiles(format('{0}/package.json', inputs.service_name)) == '' }}
        run: echo "No package.json found. Quality checks skipped."

  dependency-review:
    name: "${{ inputs.service_name }} - Dependency Review"
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
