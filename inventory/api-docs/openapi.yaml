openapi: 3.0.3
info:
  title: Green-Cart Inventory Service API
  version: 1.0.0
  description: Product-focused inventory API for CRUD and stock management.
servers:
  - url: http://localhost:8082
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service health
  /inventory:
    get:
      summary: Get all products
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: isActive
          schema:
            type: boolean
        - in: query
          name: inStock
          schema:
            type: boolean
        - in: query
          name: lowStock
          schema:
            type: boolean
        - in: query
          name: minPrice
          schema:
            type: number
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: number
            minimum: 0
        - in: query
          name: sort
          schema:
            type: string
            description: Comma-separated fields, prepend - for descending
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"
    post:
      summary: Create a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/Product"
  /inventory/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/Product"
    put:
      summary: Update product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/Product"
    delete:
      summary: Delete product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Product deleted
  /inventory/sku/{sku}:
    get:
      summary: Get product by SKU
      parameters:
        - in: path
          name: sku
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/Product"
  /inventory/{id}/availability:
    get:
      summary: Check stock availability for a product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: quantity
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                  currentStock:
                    type: integer
  /inventory/{id}/stock:
    patch:
      summary: Adjust stock for a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockUpdateRequest"
      responses:
        "200":
          description: Stock updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/Product"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        sku:
          type: string
        price:
          type: number
        compareAtPrice:
          type: number
        stock:
          type: integer
        lowStockThreshold:
          type: integer
        unit:
          type: string
        images:
          type: array
          items:
            type: string
            format: uri
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateProductRequest:
      type: object
      required:
        - name
        - sku
        - price
        - stock
        - lowStockThreshold
        - unit
      properties:
        name:
          type: string
        description:
          type: string
        sku:
          type: string
        price:
          type: number
          minimum: 0
        compareAtPrice:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        lowStockThreshold:
          type: integer
          minimum: 0
        unit:
          type: string
        images:
          type: array
          items:
            type: string
            format: uri
        isActive:
          type: boolean
    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0
        compareAtPrice:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        lowStockThreshold:
          type: integer
          minimum: 0
        unit:
          type: string
        images:
          type: array
          items:
            type: string
            format: uri
        isActive:
          type: boolean
    StockUpdateRequest:
      type: object
      required:
        - quantity
        - type
      properties:
        quantity:
          type: integer
        type:
          type: string
          enum: [in, out, adjustment]
        reason:
          type: string
        reference:
          type: string
        notes:
          type: string
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    PaginatedProducts:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        pagination:
          $ref: "#/components/schemas/Pagination"
