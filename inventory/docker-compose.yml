version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: greencart-inventory-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: greencart_inventory
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - inventory-network

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greencart-inventory-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/greencart_inventory
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      CORS_ORIGINS: http://localhost:3000
      LOW_STOCK_THRESHOLD: 10
      DEFAULT_PAGE_SIZE: 20
      MAX_PAGE_SIZE: 100
    depends_on:
      - mongodb
    networks:
      - inventory-network

volumes:
  mongodb_data:

networks:
  inventory-network:
    driver: bridge
