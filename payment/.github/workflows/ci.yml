name: Payment CI

"on":
  push:
    paths:
      - "payment/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "payment/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Lint, Type Check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('payment/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: payment/package-lock.json

      - name: Install dependencies
        if: ${{ hashFiles('payment/package.json') != '' }}
        run: npm ci

      - name: Lint
        if: ${{ hashFiles('payment/package.json') != '' }}
        run: npm run lint --if-present

      - name: Type check
        if: ${{ hashFiles('payment/package.json') != '' }}
        run: npm run typecheck --if-present

      - name: Build
        if: ${{ hashFiles('payment/package.json') != '' }}
        run: npm run build --if-present

      - name: No package.json fallback
        if: ${{ hashFiles('payment/package.json') == '' }}
        run: echo "No payment/package.json yet - quality checks skipped."

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectBaseDir=payment

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('payment/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: ${{ hashFiles('payment/package.json') != '' }}
        run: npm ci
        working-directory: payment

      - name: Run Snyk test
        if: ${{ hashFiles('payment/package.json') != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --all-projects

      - name: No package.json fallback
        if: ${{ hashFiles('payment/package.json') == '' }}
        run: echo "No payment/package.json yet - Snyk scan skipped."

  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
