openapi: 3.1.0
info:
  title: Green-Cart Authentication API
  version: 1.0.0
  description: |
    Authentication microservice for Green-Cart. Handles user registration,
    login, JWT token lifecycle (access + refresh), and profile retrieval.
  contact:
    name: Green-Cart CTSE Team

servers:
  - url: http://localhost:8081
    description: Local development
  - url: https://auth.greencart.example.com
    description: Production (Cloud Run)

tags:
  - name: Auth
    description: Authentication and token management
  - name: Health
    description: Service health

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      description: Exchange a valid refresh token for a new access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate refresh token
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Logged out successfully (refresh token invalidated)
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: authentication

    User:
      type: object
      required: [_id, email, role, createdAt, updatedAt]
      properties:
        _id:
          type: string
          example: "6613a1e2b9e4d50012abc123"
        email:
          type: string
          format: email
          example: "user@example.com"
        role:
          type: string
          enum: [customer, admin]
          example: customer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          description: |
            Must contain at least one uppercase letter, one lowercase letter,
            one digit, and one special character (@$!%*?&).
          example: "S3cure!Pass"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          example: "S3cure!Pass"

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."

    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
          description: Short-lived JWT (15 min)
          example: "eyJhbGciOiJIUzI1NiIs..."
        refreshToken:
          type: string
          description: Long-lived JWT (7 days)
          example: "eyJhbGciOiJIUzI1NiIs..."

    RefreshResponse:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Invalid email or password."
        code:
          type: string
          example: "INVALID_CREDENTIALS"

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Too many requests from this IP. Please try again later."
              code:
                type: string
                example: "RATE_LIMITED"
